services:
  - type: web
    name: yt-jam-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: CLIENT_URL
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: PORT
        value: 3001

  - type: web
    name: yt-jam-client
    runtime: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SERVER_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
